<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillMatch - Registro</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>

    <div class="container">
        
        <div class="left-panel">
            <div class="header">
                
                <img src="logo.png" alt="SkillMatch Logo" class="logo-img">
            </div>

            <div class="main-content">
                <h2>O aprendizado ao<br>alcance de <span class="highlight-blue">todos.</span></h2>
                <a href="#" class="subscribe-link">Se inscreva &rarr;</a>
            </div>

            <div class="footer-text">
                Aprenda <span class="highlight-green">sem limites</span>. Ensine com<br>
                <span class="highlight-green">propósito</span>. Tudo em uma só<br>
                plataforma.
            </div>
        </div>

        <div class="right-panel-outer">
            <div class="right-panel-inner">
                <form action="#" method="POST">
                    <div class="input-group">
                        <label for="nome">Nome Completo*</label>
                        <input type="text" id="nome" placeholder="Value" required>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail*</label>
                        <input type="email" id="email" placeholder="Value" required>
                    </div>

                    <div class="input-group">
                        <label for="cpf">CPF*</label>
                        <input type="text" id="cpf" placeholder="Value" required>
                    </div>

                    <div class="input-group">
                        <label for="senha">Senha*</label>
                        <input type="password" id="senha" placeholder="Value" required>
                    </div>

                    <div class="input-group">
                        <label for="buscando">O que está buscando?</label>
                        <select id="buscando" required>
                            <option value="estudante" selected>Sou estudante</option>
                            <option value="professor">Sou professor</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">Registrar</button>
                </form>
            </div>
        </div>

    </div>

</body>
</html>
